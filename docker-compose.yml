services:
  # 解説動画の台本〜字幕生成サービス
  narrative-script:
    build:
      context: .
      dockerfile: services/narrative-script/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace/services/narrative-script
    env_file:
      - .env
    stdin_open: true
    tty: true

  # 新しいプラグイン構成による台本〜字幕生成サービス
  pluggable-script:
    build:
      context: .
      dockerfile: services/pluggable-script/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace/services/pluggable-script
    env_file:
      - .env
    stdin_open: true
    tty: true

  # コンテンツ編集・差分パッチサービス
  content-editor:
    build:
      context: .
      dockerfile: services/content-editor/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace/services/content-editor
    env_file:
      - .env
    stdin_open: true
    tty: true

